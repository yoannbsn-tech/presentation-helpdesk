<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Présentation - Technicien Helpdesk</title>

  <style>
    :root {
      --bg1: #111827;
      --bg2: #2563eb;
      --bg3: #06b6d4;
      --card: rgba(255,255,255,0.12);
      --card-border: rgba(255,255,255,0.22);
      --white: #ffffff;
      --muted: rgba(255,255,255,0.78);
      --accent: #facc15;
      --green: #22c55e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--white);
      background: radial-gradient(circle at top left, var(--bg3), transparent 35%),
                  linear-gradient(135deg, var(--bg1), var(--bg2));
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .deck {
      width: min(1200px, 100%);
      min-height: 720px;
      border-radius: 32px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 30px 100px rgba(0,0,0,0.35);
      backdrop-filter: blur(18px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    header, footer {
      padding: 22px 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    header {
      border-bottom: 1px solid rgba(255,255,255,0.14);
    }

    footer {
      border-top: 1px solid rgba(255,255,255,0.14);
    }

    .brand {
      font-weight: 900;
      letter-spacing: 0.2px;
    }

    .counter {
      color: var(--muted);
      font-weight: 700;
    }

    main {
      padding: 48px;
      display: flex;
      align-items: center;
    }

    .slide {
      width: 100%;
      animation: slideIn 0.35s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .badge {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(250,204,21,0.18);
      color: #fde68a;
      font-weight: 900;
      margin-bottom: 22px;
    }

    h1 {
      font-size: clamp(3rem, 7vw, 6rem);
      line-height: 0.95;
      margin: 0 0 24px;
      letter-spacing: -3px;
    }

    h2 {
      font-size: clamp(2.4rem, 5vw, 4.4rem);
      line-height: 1;
      margin: 0 0 24px;
      letter-spacing: -2px;
    }

    p {
      font-size: 1.35rem;
      line-height: 1.6;
      color: var(--muted);
      max-width: 850px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 34px;
      align-items: center;
    }

    .cards {
      display: grid;
      gap: 16px;
      margin-top: 28px;
    }

    .cards.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .cards.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 24px;
    }

    .card strong {
      display: block;
      font-size: 1.18rem;
      margin-bottom: 8px;
    }

    .card span {
      color: var(--muted);
      line-height: 1.5;
      font-size: 1rem;
    }

    .icon {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 14px;
    }

    .hero-visual {
      min-height: 420px;
      border-radius: 32px;
      background:
        radial-gradient(circle at top right, rgba(250,204,21,0.35), transparent 35%),
        rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 34px;
    }

    .big-icon {
      font-size: 9rem;
      margin-bottom: 18px;
    }

    .timeline {
      display: grid;
      gap: 18px;
      margin-top: 28px;
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 18px;
      align-items: center;
      padding: 18px;
      border-radius: 22px;
      background: var(--card);
      border: 1px solid var(--card-border);
    }

    .time {
      font-weight: 900;
      color: var(--accent);
      font-size: 1.3rem;
    }

    .progress {
      flex: 1;
      height: 10px;
      background: rgba(255,255,255,0.18);
      border-radius: 999px;
      overflow: hidden;
    }

    #progressBar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      transition: width 0.3s ease;
    }

    button {
      border: none;
      padding: 14px 22px;
      border-radius: 999px;
      font-weight: 900;
      cursor: pointer;
      background: var(--white);
      color: #111827;
      font-size: 1rem;
    }

    button.secondary {
      background: rgba(255,255,255,0.12);
      color: var(--white);
      border: 1px solid rgba(255,255,255,0.24);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .quote {
      margin-top: 28px;
      padding: 26px;
      border-left: 7px solid var(--accent);
      background: rgba(250,204,21,0.12);
      border-radius: 22px;
      font-size: 1.4rem;
      line-height: 1.5;
      max-width: 900px;
    }

    .small {
      font-size: 1rem;
      color: var(--muted);
    }

    @media (max-width: 850px) {
      body {
        padding: 10px;
      }

      .deck {
        min-height: 94vh;
        border-radius: 22px;
      }

      header, main, footer {
        padding: 22px;
      }

      main {
        align-items: flex-start;
      }

      .grid, .cards.two, .cards.three {
        grid-template-columns: 1fr;
      }

      .hero-visual {
        min-height: 260px;
      }

      .big-icon {
        font-size: 6rem;
      }

      footer {
        display: grid;
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 3rem;
      }

      h2 {
        font-size: 2.5rem;
      }
    }
  </style>
</head>

<body>
  <div class="deck">
    <header>
      <div class="brand">💻 Assistance COMPTA 4000</div>
      <div class="counter" id="counter"></div>
    </header>

    <main>
      <section class="slide" id="slide"></section>
    </main>

    <footer>
      <button class="secondary" id="prevBtn">← Précédent</button>
      <div class="progress">
        <div id="progressBar"></div>
      </div>
      <button id="nextBtn">Suivant →</button>
    </footer>
  </div>

  <script>
    const slides = [
      {
        title: "Technicien d’assistance informatique Helpdesk",
        badge: "Présentation métier · 15 minutes",
        content: `
          <div class="grid">
            <div>
              <span class="badge">Présentation métier · 15 minutes</span>
              <h1>Technicien Helpdesk</h1>
              <p>
                Le premier contact des utilisateurs quand un problème informatique bloque leur travail.
              </p>
              <div class="quote">
                Objectif : comprendre, rassurer, diagnostiquer et remettre l’utilisateur en situation de travailler.
              </div>
            </div>

            <div class="hero-visual">
              <div>
                <div class="big-icon">☎️💻</div>
                <h2>Support + technique + humain</h2>
                <p class="small">Un métier où l’on résout des problèmes, mais surtout où l’on aide des personnes.</p>
              </div>
            </div>
          </div>
        `
      },
      {
        title: "Le métier en une phrase",
        badge: "1 · Le métier",
        content: `
          <span class="badge">1 · Le métier</span>
          <h2>À quoi sert un technicien Helpdesk ?</h2>
          <p>
            Il accompagne les utilisateurs lorsqu’ils rencontrent un problème avec leur ordinateur,
            leurs logiciels, leur connexion ou leurs accès.
          </p>

          <div class="cards three">
            <div class="card"><span class="icon">💬</span><strong>Assister</strong><span>Écouter l’utilisateur, comprendre sa demande et l’aider avec des mots simples.</span></div>
            <div class="card"><span class="icon">🔍</span><strong>Diagnostiquer</strong><span>Identifier l’origine du problème : logiciel, matériel, réseau ou compte utilisateur.</span></div>
            <div class="card"><span class="icon">✅</span><strong>Résoudre</strong><span>Corriger l’incident ou le transmettre à l’équipe spécialisée si nécessaire.</span></div>
          </div>
        `
      },
      {
        title: "Une journée type",
        badge: "2 · Quotidien",
        content: `
          <span class="badge">2 · Quotidien</span>
          <h2>Une journée type</h2>
          <p>Le quotidien alterne entre appels, tickets, diagnostic, prise en main à distance et suivi des incidents.</p>

          <div class="timeline">
            <div class="timeline-item"><div class="time">08h30</div><div>Ouverture des outils : téléphone, messagerie, ticketing, base de connaissances.</div></div>
            <div class="timeline-item"><div class="time">09h00</div><div>Réception des appels utilisateurs et qualification des demandes.</div></div>
            <div class="timeline-item"><div class="time">10h30</div><div>Diagnostic : tests réseau, vérification logiciel, prise en main à distance.</div></div>
            <div class="timeline-item"><div class="time">14h00</div><div>Installation, configuration, mise à jour ou escalade vers une équipe experte.</div></div>
            <div class="timeline-item"><div class="time">16h30</div><div>Mise à jour des tickets, documentation et information de l’utilisateur.</div></div>
          </div>
        `
      },
      {
        title: "Compétences comportementales",
        badge: "3 · Soft skills",
        content: `
          <span class="badge">3 · Compétences comportementales</span>
          <h2>Les qualités essentielles</h2>
          <p>
            Le métier est technique, mais la relation utilisateur est centrale. Un bon technicien sait expliquer, rassurer et garder son calme.
          </p>

          <div class="cards three">
            <div class="card"><span class="icon">👂</span><strong>Écoute</strong><span>Comprendre le vrai problème derrière la demande.</span></div>
            <div class="card"><span class="icon">🗣️</span><strong>Communication</strong><span>Expliquer simplement, sans noyer l’utilisateur dans le jargon.</span></div>
            <div class="card"><span class="icon">😌</span><strong>Patience</strong><span>Accompagner des personnes parfois stressées ou perdues.</span></div>
            <div class="card"><span class="icon">🧠</span><strong>Analyse</strong><span>Procéder avec méthode pour identifier la cause.</span></div>
            <div class="card"><span class="icon">📋</span><strong>Organisation</strong><span>Prioriser, documenter et suivre les incidents.</span></div>
            <div class="card"><span class="icon">🤝</span><strong>Travail d’équipe</strong><span>Partager les infos et escalader quand c’est nécessaire.</span></div>
          </div>
        `
      },
      {
        title: "Compétences techniques",
        badge: "4 · Technique",
        content: `
          <span class="badge">4 · Compétences techniques</span>
          <h2>Ce qu’il faut savoir manipuler</h2>

          <div class="cards three">
            <div class="card"><span class="icon">🪟</span><strong>Systèmes</strong><span>Windows, notions Linux, Android, iOS.</span></div>
            <div class="card"><span class="icon">🌐</span><strong>Réseau</strong><span>Wi-Fi, VPN, DNS, DHCP, connexion Internet.</span></div>
            <div class="card"><span class="icon">🏢</span><strong>Active Directory</strong><span>Comptes utilisateurs, groupes, droits d’accès.</span></div>
            <div class="card"><span class="icon">🛠️</span><strong>Outils support</strong><span>Ticketing, prise en main à distance, base de connaissances.</span></div>
            <div class="card"><span class="icon">🔐</span><strong>Sécurité</strong><span>Antivirus, mots de passe, MFA, RGPD, bonnes pratiques.</span></div>
            <div class="card"><span class="icon">💻</span><strong>Postes & logiciels</strong><span>Installation, configuration, mises à jour, imprimantes.</span></div>
          </div>
        `
      },
      {
        title: "La formation",
        badge: "5 · Formation",
        content: `
          <span class="badge">5 · Formation</span>
          <h2>Ce qu’on apprend en formation</h2>
          <p>
            La formation prépare à intervenir sur les problèmes utilisateurs, les équipements numériques et les premiers éléments d’infrastructure.
          </p>

          <div class="cards three">
            <div class="card"><span class="icon">☎️</span><strong>Assistance utilisateur</strong><span>Gérer une demande, diagnostiquer un incident, accompagner l’utilisateur.</span></div>
            <div class="card"><span class="icon">🖥️</span><strong>Équipements numériques</strong><span>Préparer, déployer, maintenir et sécuriser les postes.</span></div>
            <div class="card"><span class="icon">🌐</span><strong>Infrastructure</strong><span>Déployer des équipements réseau et intervenir sur Active Directory.</span></div>
          </div>
        `
      },
      {
        title: "Conseils pour réussir",
        badge: "6 · Conseils",
        content: `
          <span class="badge">6 · Conseils</span>
          <h2>Mes conseils pour réussir</h2>

          <div class="cards two">
            <div class="card"><span class="icon">✅</span><strong>Ne pas faire semblant de savoir</strong><span>Dire “je vérifie” est plus professionnel que donner une mauvaise réponse.</span></div>
            <div class="card"><span class="icon">🧭</span><strong>Être méthodique</strong><span>Un bon diagnostic suit une logique : symptômes, tests, hypothèses, solution.</span></div>
            <div class="card"><span class="icon">📚</span><strong>Apprendre en continu</strong><span>Les outils changent vite : il faut rester curieux.</span></div>
            <div class="card"><span class="icon">💬</span><strong>Parler simplement</strong><span>Le but n’est pas d’impressionner l’utilisateur, mais de l’aider.</span></div>
          </div>

          <div class="quote">
            Le meilleur technicien n’est pas celui qui sait tout : c’est celui qui sait chercher, expliquer et garder son calme.
          </div>
        `
      },
      {
        title: "Pourquoi ce métier ?",
        badge: "7 · Conclusion",
        content: `
          <span class="badge">7 · Conclusion</span>
          <h2>Pourquoi choisir ce métier ?</h2>
          <p>
            Parce qu’il mélange technique, contact humain, résolution de problèmes et apprentissage permanent.
          </p>

          <div class="cards three">
            <div class="card"><span class="icon">🚀</span><strong>On progresse vite</strong><span>Chaque incident apprend quelque chose.</span></div>
            <div class="card"><span class="icon">🤝</span><strong>On aide concrètement</strong><span>On débloque des personnes dans leur travail quotidien.</span></div>
            <div class="card"><span class="icon">🧱</span><strong>C’est une base solide</strong><span>Pour évoluer vers systèmes, réseaux, cybersécurité ou administration.</span></div>
          </div>
        `
      },
      {
        title: "Questions",
        badge: "Merci",
        content: `
          <div class="hero-visual">
            <div>
              <div class="big-icon">🙋‍♂️</div>
              <h2>Merci pour votre attention</h2>
              <p>À vous maintenant : quelles questions vous viennent sur le métier ?</p>
            </div>
          </div>
        `
      }
    ];

    let currentSlide = 0;

    const slide = document.getElementById("slide");
    const counter = document.getElementById("counter");
    const progressBar = document.getElementById("progressBar");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    function renderSlide() {
      slide.innerHTML = slides[currentSlide].content;
      counter.textContent = `${currentSlide + 1} / ${slides.length}`;
      progressBar.style.width = `${((currentSlide + 1) / slides.length) * 100}%`;
      prevBtn.disabled = currentSlide === 0;
      nextBtn.textContent = currentSlide === slides.length - 1 ? "Recommencer" : "Suivant →";
    }

    function nextSlide() {
      if (currentSlide === slides.length - 1) {
        currentSlide = 0;
      } else {
        currentSlide++;
      }
      renderSlide();
    }

    function prevSlide() {
      if (currentSlide > 0) {
        currentSlide--;
        renderSlide();
      }
    }

    nextBtn.addEventListener("click", nextSlide);
    prevBtn.addEventListener("click", prevSlide);

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight" || event.key === " ") {
        nextSlide();
      }

      if (event.key === "ArrowLeft") {
        prevSlide();
      }
    });

    renderSlide();
  </script>
</body>
</html>
